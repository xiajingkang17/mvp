provider: zhipu

zhipu:
  # Default model (can be overridden by ZHIPU_MODEL in .env)
  model: glm-4.7

  # Sampling params (can be overridden by .env)
  temperature: 0.3
  top_p: 0.95
  max_tokens: 8192

  # Request timeout in seconds
  timeout_s: 240

  # Retries for transient errors (HTTP 5xx / timeout / connection reset)
  retries: 2
  retry_backoff_s: 1.5

  # Disable reasoning/thinking by default; helps JSON output stability
  enable_thinking: false

  # Stage-mode sampling profiles.
  # Each stage can override sampling by mode:
  # - generate: first draft generation
  # - continue: continuation when JSON is truncated
  # - repair: validation-driven JSON repair
  stages:
    llm0:
      generate:
        temperature: 0.20
        top_p: 0.90
      continue:
        temperature: 0.10
        top_p: 0.85
      repair:
        temperature: 0.04
        top_p: 0.80

    llm1:
      generate:
        temperature: 0.22
        top_p: 0.90
      continue:
        temperature: 0.10
        top_p: 0.85
      repair:
        temperature: 0.04
        top_p: 0.80

    llm_n:
      generate:
        temperature: 0.33
        top_p: 0.93
      continue:
        temperature: 0.12
        top_p: 0.86
      repair:
        temperature: 0.05
        top_p: 0.80

    llm2:
      generate:
        temperature: 0.60
        top_p: 0.95
      continue:
        temperature: 0.15
        top_p: 0.88
      repair:
        temperature: 0.06
        top_p: 0.80

    llm_draw:
      generate:
        temperature: 0.15
        top_p: 0.95
      continue:
        temperature: 0.10
        top_p: 0.88
      repair:
        temperature: 0.05
        top_p: 0.80

    llm3:
      generate:
        temperature: 0.25
        top_p: 0.92
      continue:
        temperature: 0.10
        top_p: 0.86
      repair:
        temperature: 0.05
        top_p: 0.80

    llm_codegen:
      generate:
        temperature: 0.20
        top_p: 0.90
      continue:
        temperature: 0.10
        top_p: 0.84
      repair:
        temperature: 0.04
        top_p: 0.78
