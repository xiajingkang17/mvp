provider: zhipu

zhipu:
  # 默认模型（可被 MVP/.env 中的 ZHIPU_MODEL 覆盖）
  model: glm-4.7

  # 默认采样参数（可被 MVP/.env 覆盖）
  temperature: 0.3
  top_p: 0.95
  max_tokens: 8192

  # 请求超时（秒）
  timeout_s: 240

  # 重试
  retries: 2
  retry_backoff_s: 1.5

  # 默认禁用 thinking：更利于严格 JSON 输出
  enable_thinking: false

  # 按“角色(stage) + 模式(mode)”覆盖采样参数
  # mode:
  # - generate: 首次生成
  # - continue: JSON 截断续写
  # - repair: JSON 修复/渲染报错修复
  stages:
    analyst:
      generate:
        temperature: 0.20
        top_p: 0.90
      continue:
        temperature: 0.10
        top_p: 0.85
      repair:
        temperature: 0.04
        top_p: 0.80

    scene_planner:
      generate:
        temperature: 0.22
        top_p: 0.90
      continue:
        temperature: 0.10
        top_p: 0.85
      repair:
        temperature: 0.04
        top_p: 0.80

    scene_designer:
      generate:
        temperature: 0.60
        top_p: 0.95
      continue:
        temperature: 0.15
        top_p: 0.88
      repair:
        temperature: 0.06
        top_p: 0.80

    layout_designer:
      generate:
        temperature: 0.35
        top_p: 0.92
      continue:
        temperature: 0.12
        top_p: 0.86
      repair:
        temperature: 0.05
        top_p: 0.80

    codegen:
      generate:
        temperature: 0.20
        top_p: 0.90
      continue:
        temperature: 0.10
        top_p: 0.84
      repair:
        temperature: 0.05
        top_p: 0.80

    codegen_bundle:
      generate:
        temperature: 0.20
        top_p: 0.90
      continue:
        temperature: 0.10
        top_p: 0.84
      repair:
        temperature: 0.05
        top_p: 0.80

    fixer:
      generate:
        temperature: 0.15
        top_p: 0.88
      continue:
        temperature: 0.10
        top_p: 0.84
      repair:
        temperature: 0.05
        top_p: 0.80

