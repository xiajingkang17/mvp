anthropic:
  # Claude proxy. Prefer ANTHROPIC_AUTH_TOKEN from MVP/.env, then ANTHROPIC_API_KEY.
  model: claude-sonnet-4-6
  temperature: 0.20
  top_p: 0.90
  max_tokens: 1800
  timeout_s: 240
  retries: 2
  retry_backoff_s: 1.5
  # Code requests <base_url>/v1/messages
  base_url: https://ai.jiexi6.cn/

  stages:
    analyst:
      generate:
        max_tokens: 3600
        temperature: 0.20
        top_p: 0.90
      continue:
        max_tokens: 1800
        temperature: 0.10
        top_p: 0.85
      repair:
        max_tokens: 1000
        temperature: 0.04
        top_p: 0.80

    layout_designer:
      generate:
        max_tokens: 2600
        temperature: 0.22
        top_p: 0.90
      continue:
        max_tokens: 1300
        temperature: 0.10
        top_p: 0.85
      repair:
        max_tokens: 900
        temperature: 0.05
        top_p: 0.80

    codegen_bundle:
      generate:
        max_tokens: 9000
        temperature: 0.20
        top_p: 0.90
      continue:
        max_tokens: 4000
        temperature: 0.10
        top_p: 0.84
      repair:
        max_tokens: 1500
        temperature: 0.05
        top_p: 0.80

    fixer:
      generate:
        max_tokens: 1800
        temperature: 0.15
        top_p: 0.88
      continue:
        max_tokens: 900
        temperature: 0.10
        top_p: 0.84
      repair:
        max_tokens: 700
        temperature: 0.05
        top_p: 0.80
